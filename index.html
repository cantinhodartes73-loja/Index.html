<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho das Artes</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #10b981; --fundo: #f0fdf4; }
        body { font-family: sans-serif; max-width: 450px; margin: auto; padding: 15px; background: var(--fundo); }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #splash img { width: 150px; border-radius: 50%; border: 3px solid var(--verde); }

        h1 { text-align: center; }
        .logo { max-width: 140px; border-radius: 50%; border: 2px solid var(--verde); display: block; margin: 0 auto; }
        .titulo { margin-top: 10px; color: var(--verde); font-size: 32px; font-family: 'Great Vibes', cursive; }

        .tabs { display: flex; gap: 8px; overflow-x: auto; margin: 15px 0; padding-bottom: 5px; }
        .tab { padding: 10px 18px; background: #e5e7eb; border-radius: 12px; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .tab.active { background: var(--verde); color: white; font-weight: bold; }

        .card { background: white; border-radius: 18px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .img-p { width: 100%; height: 280px; object-fit: cover; display: block; }
        .info { padding: 15px; text-align: center; }

        /* ESTILO DOS PREÇOS */
        .preco-box { margin: 10px 0; display: flex; flex-direction: column; align-items: center; }
        .preco-antigo { text-decoration: line-through; color: #94a3b8; font-size: 14px; margin: 0; }
        .preco-novo { color: #dc2626; font-weight: bold; font-size: 22px; margin: 2px 0; }
        .preco-normal { font-weight: bold; font-size: 22px; color: #1e293b; }

        .btn-add { background: var(--verde); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .badge { position: absolute; left: 12px; top: 12px; background: #ef4444; color: white; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        
        .paginacao { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .btn-pag { padding: 8px 15px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; }
        .btn-pag.active { background: var(--verde); color: white; }

        .carrinho { background: white; padding: 20px; border-radius: 20px; border: 2px solid var(--verde); margin-top: 20px; }
        input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="splash"><img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg"></div>

<h1>
    <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg" class="logo">
    <div class="titulo">Cantinho das Artes</div>
</h1>

<div class="tabs" id="tabs"></div>
<div id="loja"></div>
<div class="paginacao" id="paginacao"></div>

<div class="carrinho">
    <h2 style="margin:0; color:var(--verde);">🛒 O Teu Pedido</h2>
    <div id="itens-carrinho" style="margin:15px 0;"></div>
    <p id="total-carrinho" style="font-size:20px; font-weight:bold;"></p>
    <input id="cliente" placeholder="O teu nome">
    <button onclick="finalizar()" style="background:#25D366; color:white; border:none; width:100%; padding:15px; border-radius:12px; font-weight:bold; margin-top:10px; cursor:pointer;">Pedir no WhatsApp</button>
</div>

<script>
    const API = 'https://script.google.com/macros/s/AKfycbxGsDtiXsYF5J5jVUHX4X64f5CoqEbY-2w1UU4NcuS2MTYZBnlVWaAb5KEbJt7aIijF/exec';
    let db = [], cart = [], catAtiva = "", pagina = 1, pPorPagina = 10;

    function limparPreco(v) { return parseFloat(String(v).replace('€','').replace(',','.').trim()) || 0; }

    fetch(API).then(r => r.json()).then(data => {
        db = data.map(p => ({
            ...p,
            preco: limparPreco(p.preco),
            precoPromo: limparPreco(p.precoPromo),
            promo: String(p.promo).toLowerCase().trim() === "sim"
        }));

        let cats = [...new Set(db.map(p => p.categoria))];
        let menu = db.some(p => p.promo) ? ["🔥 Promoções", ...cats] : cats;
        catAtiva = menu[0];

        document.getElementById("tabs").innerHTML = menu.map(c => `
            <div class="tab ${c === catAtiva ? 'active' : ''}" onclick="mudarCat('${c}')">${c}</div>
        `).join("");

        document.getElementById("splash").style.display = "none";
        render();
    });

    function mudarCat(c) { catAtiva = c; pagina = 1; render(); }

    function render() {
        let lista = db.filter(p => catAtiva === "🔥 Promoções" ? p.promo : p.categoria === catAtiva);
        let totalPags = Math.ceil(lista.length / pPorPagina);
        let itens = lista.slice((pagina-1)*pPorPagina, pagina*pPorPagina);

        let h = "";
        itens.forEach(p => {
            let precoHTML = (p.promo && p.precoPromo > 0) ? 
                `<div class="preco-box"><span class="preco-antigo">${p.preco.toFixed(2)}€</span><span class="preco-novo">${p.precoPromo.toFixed(2)}€ 🔥</span></div>` :
                `<div class="preco-box"><span class="preco-normal">${p.preco.toFixed(2)}€</span></div>`;

            h += `<div class="card">
                ${p.promo ? '<div class="badge">PROMOÇÃO</div>' : ''}
                <img src="${p.img}" class="img-p">
                <div class="info">
                    <h3 style="margin:0; font-size:16px;">#${p.id} - ${p.nome}</h3>
                    ${precoHTML}
                    <button class="btn-add" onclick="add(${p.id})">Adicionar</button>
                </div>
            </div>`;
        });
        document.getElementById("loja").innerHTML = h;

        let pagH = "";
        if(totalPags > 1) {
            for(let i=1; i<=totalPags; i++) pagH += `<button class="btn-pag ${i===pagina?'active':''}" onclick="ir
