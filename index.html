<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantinho das Artes</title>

<link rel="icon" type="image/jpeg" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">
<link rel="apple-touch-icon" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root { --verde:#10b981; --fundo:#f0fdf4; --vermelho:#ef4444; }
body { font-family:'Poppins', sans-serif; max-width:450px; margin:auto; padding:15px; background:var(--fundo); color: #374151; }

#splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
#splash img { width: 180px; border-radius: 50%; border: 3px solid var(--verde); }
#splash h2 { font-size: 30px; color: var(--verde); font-family: 'Great Vibes', cursive; margin-top:15px; }

h1 { text-align:center; margin-bottom:10px; }
h1 .logo { max-width:150px; width:100%; border-radius:50%; border: 2px solid var(--verde); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
h1 .titulo { margin-top:8px; color:var(--verde); font-size:36px; font-family:'Great Vibes', cursive; }

.search { width:100%; padding:12px; border-radius:12px; border:1px solid #ddd; margin-bottom:15px; font-family: inherit; }
.tabs { display:flex; gap:8px; overflow-x:auto; margin-bottom:15px; padding-bottom:5px; scrollbar-width: none; }
.tab { padding:8px 18px; background:#e5e7eb; border-radius:20px; cursor:pointer; white-space: nowrap; font-size: 14px; font-weight: 500; transition: 0.3s; }
.tab.active { background:var(--verde); color:white; }

.card { background:white; border-radius:20px; margin-bottom:20px; overflow:hidden; box-shadow:0 10px 15px -3px rgba(0,0,0,0.05); position: relative; }
.img-p { width:100%; height:280px; object-fit:cover; }
.badge { position:absolute; left:15px; top:15px; background:var(--vermelho); color:white; padding:5px 12px; border-radius:10px; font-size:12px; font-weight:bold; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

.info { padding:15px; text-align:center; }
.nome-prod { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: #1f2937; }
.preco-de { text-decoration:line-through; color:#9ca3af; font-size:14px; margin:0; }
.preco-por { color:var(--vermelho); font-weight:bold; font-size:20px; margin:20px 0; }
.preco-normal { font-weight:bold; font-size:20px; color:var(--verde); margin:5px 0; }

.btn-add { background:var(--verde); color:white; border:none; padding:14px; width:100%; border-radius:12px; cursor:pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }

.carrinho { background:white; padding:20px; border-radius:20px; margin-top:30px; border: 2px solid var(--verde); }
.btn-w { background:#25D366; color:white; padding:15px; border:none; width:100%; border-radius:12px; margin-top:10px; cursor:pointer; font-weight: bold; }

.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:10000; }
.modal img { max-width:95%; max-height:85%; border-radius:10px; }
</style>
</head>
<body>

<div id="splash">
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">
  <h2>Cantinho das Artes 👋</h2>
</div>

<h1>
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg" class="logo">
  <div class="titulo">Cantinho das Artes 🎨</div>
</h1>

<input class="search" id="pesquisa" placeholder="🔍 O que procuras hoje?" oninput="renderProdutos()">
<div class="tabs" id="tabs"></div>
<div id="loja"></div>

<div class="carrinho">
  <h2 style="color:var(--verde); margin-bottom:15px;">🛒 O Teu Pedido</h2>
  <div id="itens-carrinho"></div>
  <p id="total-carrinho" style="font-size: 20px; font-weight:bold; margin: 15px 0;"></p>
  <input id="cliente" placeholder="O teu nome">
  <button onclick="finalizar()" class="btn-w">Finalizar via WhatsApp</button>
</div>

<div class="modal" id="modal" onclick="this.style.display='none'">
  <img id="imgGrande">
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxGsDtiXsYF5J5jVUHX4X64f5CoqEbY-2w1UU4NcuS2MTYZBnlVWaAb5KEbJt7aIijF/exec'; 

let db = [];
let cart = [];
let categoriaAtual = "";

async function carregar() {
  try {
    const r = await fetch(API);
    const data = await r.json();
    
    db = data.map(p => ({
      id: p.id || "0",
      nome: p.nome || "Sem nome",
      preco: String(p.preco || "0"),
      promocao: String(p.promocao || "").trim(),
      img: p.img || p.imagem || "",
      categoria: p.categoria || "Geral"
    }));

    let cats = [...new Set(db.map(p => p.categoria))];
    let temPromo = db.some(p => p.promocao !== "");
    let finalCats = temPromo ? ["🔥 Promoções", ...cats] : cats;
    
    categoriaAtual = finalCats[0];
    
    document.getElementById('tabs').innerHTML = finalCats.map(c => 
      `<div class="tab ${c === categoriaAtual ? 'active' : ''}" onclick="mudar('${c}', this)">${c}</div>`
    ).join("");

    renderProdutos();
    document.getElementById('splash').style.display = 'none';
  } catch (e) {
    alert("Erro ao carregar os dados. Verifica a internet.");
  }
}

function mudar(c, el) {
  categoriaAtual = c;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderProdutos();
}

function renderProdutos() {
  let termo = document.getElementById('pesquisa').value.toLowerCase();
  let lista = db.filter(p => {
    let matchBusca = p.nome.toLowerCase().includes(termo);
    if(categoriaAtual === "🔥 Promoções") return p.promocao !== "" && matchBusca;
    return p.categoria === categoriaAtual && matchBusca;
  });

  let h = "";
  lista.forEach(p => {
    let temPromo = p.promocao !== "";
    h += `
      <div class="card">
        ${temPromo ? '<div class="badge">PROMOÇÃO</div>' : ''}
        <img src="${p.img}" class="img-p" onclick="abrirImg('${p.img}')">
        <div class="info">
          <div class="nome-prod">#${p.id} - ${p.nome}</div>
          ${temPromo 
            ? `<p class="preco-de">${p.preco}€</p><p class="preco-por">${p.promocao}€ 🔥</p>` 
            : `<p class="preco-normal">${p.preco}€</p>`}
          <button class="btn-add" onclick="add('${p.id}')">Adicionar ao Carrinho</button>
        </div>
      </div>`;
  });
  document.getElementById('loja').innerHTML = h || "<p style='text-align:center; padding:20px;'>Sem produtos aqui.</p>";
}

function add(id) {
  let p = db.find(x => x.id == id);
  let valor = p.promocao !== "" ? p.promocao : p.preco;
  cart.push({ nome: p.nome, preco: valor });
  atualizarCarrinho();
}

function atualizarCarrinho() {
  let h = "";
  let total = 0;
  cart.forEach((item, i) => {
    let precoLimp = parseFloat(String(item.preco).replace('€','').replace(',','.'));
    total += precoLimp;
    h += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:14px;">
            <span>${item.nome}</span>
            <span>${item.preco}€</span>
          </div>`;
  });
  document.getElementById('itens-carrinho').innerHTML = h;
  document.getElementById('total-carrinho').innerHTML = "Total: " + total.toFixed(2) + "€";
}

function finalizar() {
  let nome = document.getElementById('cliente').value;
  if(!nome || cart.length === 0) return alert("Carrinho vazio ou falta o teu nome!");
  let msg = `*Novo Pedido Cantinho das Artes*\n*Cliente:* ${nome}\n\n`;
  cart.forEach(i => msg += `• ${i.nome} - ${i.preco}€\n`);
  window.open(`https://wa.me/351932299225?text=${encodeURIComponent(msg)}`);
}

function abrirImg(s) { 
  document.getElementById('modal').style.display='flex'; 
  document.getElementById('imgGrande').src=s; 
}

carregar();
</script>
</body>
</html>
