<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantinho das Artes</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">
<link rel="apple-touch-icon" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">

<meta name="theme-color" content="#10b981">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --verde:#10b981; --fundo:#f0fdf4; }
body { font-family:sans-serif; max-width:450px; margin:auto; padding:15px; background:var(--fundo); color: #374151; }

/* BANNER DE INSTALAÇÃO PWA */
#pwa-install-banner {
    position: fixed; bottom: 20px; left: 15px; right: 15px;
    background: white; padding: 18px; border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    display: none; z-index: 10001;
    border: 2px solid var(--verde);
    animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes slideUp { from { transform: translateY(120%); } to { transform: translateY(0); } }
.pwa-content { display: flex; align-items: center; gap: 15px; }
.pwa-icon { width: 55px; height: 55px; border-radius: 12px; }
.pwa-text h4 { margin: 0; font-size: 16px; color: #111; }
.pwa-text p { margin: 3px 0 0; font-size: 13px; color: #666; }
.pwa-buttons { display: flex; gap: 10px; margin-top: 15px; }
.btn-pwa-install { background: var(--verde); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 2; }
.btn-pwa-close { background: #f3f4f6; color: #4b5563; border: none; padding: 10px; border-radius: 10px; cursor: pointer; flex: 1; }

/* SPLASH SCREEN */
#splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0fdf4; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.8s; }
#splash img { width: 200px; height: 200px; border-radius: 50%; border: 5px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
#splash h2 { font-size: 32px; color: var(--verde); font-family: 'Great Vibes', cursive; margin-top: 20px; }

/* LAYOUT LOJA */
h1 { text-align:center; margin-bottom:20px; }
h1 .logo { width:150px; height:150px; object-fit: cover; border-radius:50%; display:block; margin:0 auto; border: 3px solid var(--verde); }
h1 .titulo { margin-top:12px; color:var(--verde); font-size:38px; font-family:'Great Vibes', cursive; }
.search { width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px; box-sizing: border-box; outline: none; }
.tabs { display:flex; gap:8px; overflow-x:auto; margin-bottom:15px; padding-bottom:8px; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding:10px 18px; background:#e5e7eb; border-radius:12px; cursor:pointer; white-space: nowrap; }
.tab.active { background:var(--verde); color:white; font-weight: bold; }
.card { background:white; border-radius:15px; margin-bottom:20px; overflow:hidden; box-shadow:0 4px 6px rgba(0,0,0,0.05); position:relative; }
.img-p { width:100%; height:280px; object-fit:cover; cursor:pointer; display: block; }
.info { padding:15px; text-align:center; }
.btn-add { background:var(--verde); color:white; border:none; padding:14px; width:100%; border-radius:10px; cursor:pointer; font-weight: bold; }
.carrinho { background:white; padding:20px; border-radius:20px; margin-top:30px; border: 2px solid var(--verde); }
.btn-w { background:#25D366; color:white; padding:15px; border:none; width:100%; border-radius:12px; margin-top:10px; cursor:pointer; font-weight: bold; }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:10000; }
.modal img { max-width:95%; max-height:90%; border-radius:10px; }
input, select { width:100%; padding:12px; margin-top:10px; border-radius:10px; border:1px solid #ddd; box-sizing: border-box; }
</style>
</head>
<body>

<div id="pwa-install-banner">
  <div class="pwa-content">
    <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg" class="pwa-icon">
    <div class="pwa-text">
      <h4>Instalar Aplicação</h4>
      <p>Acede à loja no teu ecrã inicial!</p>
    </div>
  </div>
  <div class="pwa-buttons">
    <button class="btn-pwa-close" onclick="fecharBannerPWA()">Depois</button>
    <button class="btn-pwa-install" id="btnInstall">Instalar</button>
  </div>
</div>

<div id="splash">
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">
  <h2>Bem-vinda 👋</h2>
</div>

<h1>
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg" class="logo">
  <div class="titulo">Cantinho das Artes</div>
</h1>

<input class="search" id="pesquisa" placeholder="🔍 O que procuras?" oninput="renderProdutos()">
<div class="tabs" id="tabs"></div>
<div id="loja"></div>

<div class="carrinho">
  <h2>🛒 O Teu Pedido</h2>
  <div id="itens-carrinho"></div>
  <p id="total-carrinho"></p>
  <input id="cliente" placeholder="Teu nome">
  <input id="telefone" placeholder="Telemóvel">
  <input id="morada" placeholder="Morada">
  <select id="envio" onchange="atualizar()">
    <option>Levantamento (Grátis)</option>
    <option>CTT Normal</option>
    <option>CTT Registado</option>
  </select>
  <button onclick="finalizar()" class="btn-w">Pedir via WhatsApp</button>
  <button onclick="limparCarrinho()" class="btn-w" style="background:#dc2626;">Limpar Carrinho</button>
</div>

<div class="modal" id="modal" onclick="fecharModal()">
  <img id="imgGrande">
</div>

<script>
/* LÓGICA PWA */
let deferredPrompt;
const installBanner = document.getElementById('pwa-install-banner');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  let showCount = parseInt(localStorage.getItem('pwa_views') || '0');
  let installed = localStorage.getItem('pwa_installed') === 'true';
  if (!installed && showCount < 3) {
    setTimeout(() => { installBanner.style.display = 'block'; }, 4000);
  }
});

document.getElementById('btnInstall').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      localStorage.setItem('pwa_installed', 'true');
      installBanner.style.display = 'none';
    }
    deferredPrompt = null;
  }
});

function fecharBannerPWA() {
  installBanner.style.display = 'none';
  let showCount = parseInt(localStorage.getItem('pwa_views') || '0');
  localStorage.setItem('pwa_views', showCount + 1);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
  });
}

/* LÓGICA LOJA */
window.addEventListener("load", () => {
  setTimeout(() => { 
    document.getElementById("splash").style.opacity = "0";
    setTimeout(() => { document.getElementById("splash").style.display = "none"; }, 800);
  }, 2500);
});

const API = 'https://script.google.com/macros/s/AKfycbxGsDtiXsYF5J5jVUHX4X64f5CoqEbY-2w1UU4NcuS2MTYZBnlVWaAb5KEbJt7aIijF/exec'; 
let db = [], cart = JSON.parse(localStorage.getItem("cart_artes")) || [], categoriaAtual = "Promoções";

fetch(API).then(r=>r.json()).then(data=>{
  db = data.map(p=>({...p, id:parseInt(p.id), preco:parseFloat(p.preco), promo:p.promo==="sim"}));
  renderCategorias();
  renderProdutos();
  atualizar();
});

function renderCategorias(){
  let cats = ["Promoções", ...new Set(db.map(p=>p.categoria))];
  document.getElementById('tabs').innerHTML = cats.map(c=>`<div class="tab ${c===categoriaAtual?'active':''}" onclick="mudar('${c}',this)">${c}</div>`).join("");
}

function mudar(c,el){
  categoriaAtual = c;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderProdutos();
}

function renderProdutos(){
  let termo = document.getElementById('pesquisa').value.toLowerCase();
  let lista = db.filter(p => (categoriaAtual === "Promoções" ? p.promo : p.categoria === categoriaAtual) && p.nome.toLowerCase().includes(termo));
  document.getElementById('loja').innerHTML = lista.map(p=>`
    <div class="card">
      <img src="${p.img}" class="img-p" onclick="abrirImg('${p.img}')">
      <div class="info">
        <h3>${p.nome}</h3>
        <p><strong>${p.preco.toFixed(2)}€</strong></p>
        <button class="btn-add" onclick="add(${p.id})">Adicionar</button>
      </div>
    </div>`).join("") || "<p style='text-align:center'>Não foram encontrados produtos.</p>";
}

function add(id){
  let p = db.find(x=>x.id===id);
  let ex = cart.find(x=>x.id===id);
  if(ex) ex.qtd++; else cart.push({...p, qtd:1});
  localStorage.setItem("cart_artes", JSON.stringify(cart));
  atualizar();
}

function atualizar(){
  let total = cart.reduce((acc,p)=>acc+(p.preco*p.qtd),0);
  document.getElementById('itens-carrinho').innerHTML = cart.map((p,i)=>`<p>• ${p.nome} (x${p.qtd}) <button onclick="remover(${i})">x</button></p>`).join("");
  document.getElementById('total-carrinho').innerHTML = `<strong>Total: ${total.toFixed(2)}€</strong>`;
}

function remover(i){ cart.splice(i,1); localStorage.setItem("cart_artes", JSON.stringify(cart)); atualizar(); }
function limparCarrinho(){ cart=[]; localStorage.removeItem("cart_artes"); atualizar(); }

function finalizar(){
  if(cart.length === 0) return alert("Carrinho vazio!");
  let nome = document.getElementById('cliente').value;
  let msg = `*Pedido Cantinho das Artes*\nNome: ${nome}\n\n` + cart.map(p=>`- ${p.nome} (x${p.qtd})`).join("\n");
  window.open(`https://wa.me/351932299225?text=${encodeURIComponent(msg)}`);
}

function abrirImg(s){ document.getElementById('modal').style.display='flex'; document.getElementById('imgGrande').src=s; }
function fecharModal(){ document.getElementById('modal').style.display='none'; }
</script>
</body>
</html>
