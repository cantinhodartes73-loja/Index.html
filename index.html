<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho das Artes</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">
    <link rel="apple-touch-icon" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">
    <meta name="theme-color" content="#10b981">
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root { --verde: #10b981; --fundo: #f0fdf4; --promo: #ef4444; }
        body { font-family: sans-serif; max-width: 450px; margin: auto; padding: 15px; background: var(--fundo); color: #374151; }
        
        #pwa-install-banner {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: white; padding: 18px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none; z-index: 10001;
            border: 2px solid var(--verde);
        }
        .pwa-content { display: flex; align-items: center; gap: 12px; }
        .pwa-icon { width: 45px; height: 45px; border-radius: 8px; }
        .pwa-buttons { display: flex; gap: 8px; margin-top: 12px; }
        .btn-pwa-install { background: var(--verde); color: white; border: none; padding: 8px; border-radius: 8px; font-weight: bold; flex: 2; cursor: pointer; }
        .btn-pwa-close { background: #f3f4f6; color: #4b5563; border: none; padding: 8px; border-radius: 8px; flex: 1; cursor: pointer; }

        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0fdf4; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.8s; }
        #splash img { width: 180px; height: 180px; border-radius: 50%; border: 4px solid white; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        #splash h2 { font-size: 30px; color: var(--verde); font-family: 'Great Vibes', cursive; margin-top: 15px; }

        h1 { text-align: center; margin-bottom: 20px; }
        h1 .logo { width: 140px; height: 140px; object-fit: cover; border-radius: 50%; display: block; margin: 0 auto; border: 3px solid var(--verde); }
        h1 .titulo { margin-top: 10px; color: var(--verde); font-size: 36px; font-family: 'Great Vibes', cursive; }
        
        .search { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; box-sizing: border-box; }
        .tabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .tab { padding: 10px 18px; background: #e5e7eb; border-radius: 12px; cursor: pointer; white-space: nowrap; font-size: 14px; font-weight: bold; }
        
        /* CORES DAS ABAS */
        .tab.active { background: var(--verde); color: white; }
        .tab.promo-tab.active { background: var(--promo) !important; color: white !important; animation: blink 1.5s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.85; } 100% { opacity: 1; } }

        .card { background: white; border-radius: 12px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .badge { position: absolute; left: 8px; top: 8px; background: var(--promo); color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; z-index: 5; }
        .img-p { width: 100%; height: 280px; object-fit: cover; cursor: pointer; display: block; }
        .info { padding: 15px; text-align: center; }
        .btn-add { background: var(--verde); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .carrinho { background: white; padding: 20px; border-radius: 15px; margin-top: 25px; border: 2px solid var(--verde); }
        .item-cart { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .cart-controls { display: flex; align-items: center; gap: 8px; }
        .cart-controls button { background: #eee; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .mbway-box { background: #fdf2f8; border: 1px dashed #db2777; padding: 12px; border-radius: 10px; margin: 15px 0; text-align: center; }
        .mbway-box b { color: #db2777; }

        .btn-w { background: #25D366; color: white; padding: 15px; border: none; width: 100%; border-radius: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal img { max-width: 95%; max-height: 85%; border-radius: 8px; }
        
        input, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .paginacao { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
    </style>
</head>
<body>

<div id="pwa-install-banner">
    <div class="pwa-content">
        <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg" class="pwa-icon">
        <div class="pwa-text"><h4>Instalar App</h4><p>Adiciona ao teu ecrã inicial!</p></div>
    </div>
    <div class="pwa-buttons">
        <button class="btn-pwa-close" onclick="fecharBannerPWA()">Depois</button>
        <button class="btn-pwa-install" id="btnInstall">Instalar</button>
    </div>
</div>

<div id="splash">
    <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">
    <h2>Bem-vinda 👋</h2>
</div>

<h1>
    <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg" class="logo">
    <div class="titulo">Cantinho das Artes</div>
</h1>

<input class="search" id="pesquisa" placeholder="🔍 O que procuras?" oninput="irParaPagina(1)">
<div class="tabs" id="tabs"></div>
<div id="loja"></div>
<div class="paginacao" id="paginacao"></div>

<div class="carrinho">
    <h2>🛒 O Teu Pedido</h2>
    <div id="itens-carrinho"></div>
    <p id="total-carrinho" style="font-size: 17px; margin: 15px 0; border-top: 1px solid #eee; padding-top: 10px;"></p>
    
    <input id="cliente" placeholder="Teu nome completo">
    <input id="telefone" placeholder="Teu Telemóvel">
    <input id="morada" placeholder="Morada completa">
    
    <select id="envio" onchange="atualizar()">
        <option>Levantamento (Grátis)</option>
        <option>CTT Normal</option>
        <option>CTT Registado</option>
    </select>

    <div class="mbway-box">
        Paga por <b>MB WAY</b> para o número:<br>
        <span style="font-size: 18px; font-weight: bold;">932 299 225</span><br>
        <small>(Envia o comprovativo após finalizar o pedido)</small>
    </div>
    
    <button onclick="finalizar()" class="btn-w">Finalizar Pedido via WhatsApp</button>
    <button onclick="limparCarrinho()" class="btn-w" style="background:#dc2626; font-size: 11px; padding: 6px;">Limpar Carrinho</button>
</div>

<div class="modal" id="modal" onclick="document.getElementById('modal').style.display='none'"><img id="imgGrande"></div>

<script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        let count = parseInt(localStorage.getItem('pwa_views') || '0');
        if (count < 3) setTimeout(() => document.getElementById('pwa-install-banner').style.display = 'block', 4000);
    });
    document.getElementById('btnInstall').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('pwa-install-banner').style.display = 'none';
            deferredPrompt = null;
        }
    });
    function fecharBannerPWA() {
        document.getElementById('pwa-install-banner').style.display = 'none';
        localStorage.setItem('pwa_views', parseInt(localStorage.getItem('pwa_views') || '0') + 1);
    }
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }

    window.onload = () => setTimeout(() => { document.getElementById("splash").style.display = "none"; }, 2500);

    const API = 'https://script.google.com/macros/s/AKfycbxGsDtiXsYF5J5jVUHX4X64f5CoqEbY-2w1UU4NcuS2MTYZBnlVWaAb5KEbJt7aIijF/exec'; 
    let db = [], cart = JSON.parse(localStorage.getItem("cart_artes")) || [], categoriaAtual = "Promoções", paginaAtual = 1;

    fetch(API).then(r=>r.json()).then(data=>{
        db = data.map(p=>({...p, id:parseInt(p.id), preco:parseFloat(p.preco), precoPromo: p.precoPromo ? parseFloat(p.precoPromo) : null, promo: p.promo === "sim"}));
        renderCategorias(); renderProdutos(); atualizar();
    });

    function renderCategorias(){
        let cats = ["Promoções", ...new Set(db.map(p=>p.categoria))];
        document.getElementById('tabs').innerHTML = cats.map(c=>{
            let label = c === "Promoções" ? "Promoções 🔥" : c;
            let classePromo = c === "Promoções" ? "promo-tab" : "";
            return `<div class="tab ${classePromo} ${c===categoriaAtual?'active':''}" onclick="categoriaAtual='${c}';paginaAtual=1;renderCategorias();renderProdutos();">${label}</div>`;
        }).join("");
    }

    function renderProdutos(){
        let termo = document.getElementById('pesquisa').value.toLowerCase();
        let lista = db.filter(p => (categoriaAtual === "Promoções" ? p.promo : p.categoria === categoriaAtual) && p.nome.toLowerCase().includes(termo));
        let porPag = 10; let totalPags = Math.ceil(lista.length / porPag);
        let inicio = (paginaAtual - 1) * porPag;
        
        document.getElementById('loja').innerHTML = lista.slice(inicio, inicio + porPag).map(p=>{
            let precoHTML = p.promo && p.precoPromo 
                ? `<p style="text-decoration:line-through;color:#999;font-size:12px;margin:0;">${p.preco.toFixed(2)}€</p><p style="color:#ef4444;font-weight:bold;font-size:19px;margin:5px 0;">${p.precoPromo.toFixed(2)}€ 🔥</p>`
                : `<p style="font-weight:bold;font-size:19px;margin:10px 0;">${p.preco.toFixed(2)}€</p>`;
            return `<div class="card">
                ${p.promo ? `<div class="badge">PROMOÇÃO</div>` : ''}
                <img src="${p.img}" class="img-p" onclick="document.getElementById('modal').style.display='flex';document.getElementById('imgGrande').src='${p.img}'">
                <div class="info"><h3>#${p.id} - ${p.nome}</h3>${precoHTML}<button class="btn-add" onclick="add(${p.id})">Adicionar</button></div>
            </div>`;
        }).join("");

        let pagHTML = "";
        for(let i=1; i<=totalPags; i++) pagHTML += `<button onclick="paginaAtual=${i};renderProdutos();window.scrollTo(0,0);" style="padding:7px; background:${i===paginaAtual?'var(--verde)':'white'}; color:${i===paginaAtual?'white':'black'}; border:1px solid #ddd; border-radius:4px;">${i}</button>`;
        document.getElementById('paginacao').innerHTML = totalPags > 1 ? pagHTML : "";
    }

    function add(id){
        let p = db.find(x=>x.id===id);
        let valor = (p.promo && p.precoPromo) ? p.precoPromo : p.preco;
        let ex = cart.find(x=>x.id===id);
        if(ex) ex.qtd++; else cart.push({...p, precoFinal: valor, qtd:1});
        localStorage.setItem("cart_artes", JSON.stringify(cart)); atualizar();
    }

    function atualizar(){
        let sub = cart.reduce((acc,p)=>acc+(p.precoFinal*p.qtd),0);
        document.getElementById('itens-carrinho').innerHTML = cart.map((p,i)=>`
            <div class="item-cart"><span>#${p.id} ${p.nome}</span>
            <div class="cart-controls"><button onclick="cart[${i}].qtd--;if(cart[${i}].qtd<1)cart.splice(${i},1);localStorage.setItem('cart_artes',JSON.stringify(cart));atualizar();">-</button>
            <b>${p.qtd}</b><button onclick="cart[${i}].qtd++;localStorage.setItem('cart_artes',JSON.stringify(cart));atualizar();">+</button></div></div>`).join("");
        document.getElementById('total-carrinho').innerHTML = `<b>Total Produtos: ${sub.toFixed(2)}€</b>`;
    }

    function limparCarrinho(){ if(confirm("Limpar carrinho?")){ cart=[]; localStorage.removeItem("cart_artes"); atualizar(); } }

    function finalizar(){
        if(!cart.length) return alert("Carrinho vazio!");
        let nome = document.getElementById('cliente').value;
        let tel = document.getElementById('telefone').value;
        let envio = document.getElementById('envio').value;
        if(!nome || !tel) return alert("Preenche Nome e Telemóvel!");
        let sub = cart.reduce((acc,p)=>acc+(p.precoFinal*p.qtd),0);
        let msg = `*PEDIDO CANTINHO DAS ARTES*\n\n*Cliente:* ${nome}\n*Tel:* ${tel}\n*Morada:* ${document.getElementById('morada').value}\n*Envio:* ${envio}\n\n*ITENS:*\n` + cart.map(p=>`- #${p.id} ${p.nome} (x${p.qtd})`).join("\n") + `\n\n*TOTAL:* ${sub.toFixed(2)}€\n*Pagamento:* MB WAY 932299225`;
        window.open(`https://wa.me/351932299225?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
