<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantinho das Artes</title>

<link rel="icon" type="image/jpeg" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">
<link rel="apple-touch-icon" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#10b981">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --verde:#10b981; --fundo:#f0fdf4; }
body { font-family:sans-serif; max-width:450px; margin:auto; padding:15px; background:var(--fundo); }

/* TELA DE CARREGAMENTO */
#splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
#splash img { width: 180px; border-radius: 50%; margin-bottom: 15px; border: 3px solid var(--verde); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
#splash h2 { font-size: 30px; color: var(--verde); font-family: 'Great Vibes', cursive; }

/* CABEÇALHO */
h1 { text-align:center; margin-bottom:10px; }
h1 .logo { max-width:160px; width:100%; height:auto; border-radius:50%; display:block; margin:0 auto; border: 2px solid var(--verde); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
h1 .titulo { margin-top:8px; color:var(--verde); font-size:36px; font-weight:normal; font-family:'Great Vibes', cursive; }

/* INTERFACE */
.search { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; box-sizing: border-box; }
.tabs { display:flex; gap:5px; overflow:auto; margin-bottom:10px; padding-bottom:5px; }
.tab { padding:8px 15px; background:#e5e7eb; border-radius:10px; cursor:pointer; white-space: nowrap; font-size: 14px; }
.tab.active { background:var(--verde); color:white; font-weight: bold; }

/* CARTÕES */
.card { background:white; border-radius:15px; margin-bottom:20px; overflow:hidden; box-shadow:0 4px 6px rgba(0,0,0,0.05); }
.img-p { width:100%; height:250px; object-fit:cover; cursor:pointer; }
.info { padding:15px; text-align:center; }
.btn-add { background:var(--verde); color:white; border:none; padding:12px; width:100%; border-radius:10px; cursor:pointer; font-weight: bold; font-size: 16px; }

.card-wrap { position:relative; }
.badge { position:absolute; left:10px; top:10px; background:#ef4444; color:white; padding:5px 10px; border-radius:8px; font-size:12px; font-weight:bold; }
.fav { position:absolute; right:10px; top:10px; font-size:24px; cursor:pointer; filter: drop-shadow(0 0 2px rgba(0,0,0,0.3)); }

/* ESTILO DOS PREÇOS (O QUE TU PEDISTE) */
.container-preco { margin: 10px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50px; }
.preco-rasurado { text-decoration: line-through; color: #9ca3af; font-size: 14px; opacity: 0.7; margin: 0; line-height: 1; }
.preco-promo { color: #ef4444; font-weight: bold; font-size: 22px; margin: 5px 0 0 0; line-height: 1; }
.preco-unico { font-weight: bold; font-size: 22px; color: #1f2937; margin: 0; }

/* PAGINAÇÃO */
.paginacao { display:flex; justify-content:center; gap:8px; margin:20px 0; flex-wrap:wrap; }
.btn-pag { padding:8px 14px; border:1px solid #ddd; background:white; border-radius:8px; cursor:pointer; }
.btn-pag.active { background:var(--verde); color:white; border-color: var(--verde); }

/* MODAL */
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:10000; }
.modal img { max-width:95%; max-height:90%; border-radius:10px; border: 2px solid white; }

/* CARRINHO */
.carrinho { background:white; padding:20px; border-radius:20px; margin-top:30px; border: 2px solid var(--verde); }
.btn-w { background:#25D366; color:white; padding:14px; border:none; width:100%; border-radius:12px; margin-top:10px; cursor:pointer; font-size: 16px; font-weight: bold; }
.item-cart { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
input, select { width:100%; padding:12px; margin-top:8px; border-radius:10px; border:1px solid #ddd; box-sizing: border-box; }
</style>
</head>
<body>

<div id="splash">
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">
  <h2>Cantinho das Artes 👋</h2>
</div>

<h1>
  <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg" class="logo">
  <div class="titulo">🧵 Cantinho das Artes ✂️</div>
</h1>

<input class="search" id="pesquisa" placeholder="🔍 Procurar as tuas artes favoritas..." oninput="irParaPagina(1)">
<div class="tabs" id="tabs"></div>
<div id="loja"></div>
<div class="paginacao" id="paginacao"></div>

<div class="carrinho">
  <h2>🛒 O Teu Pedido</h2>
  <div id="itens-carrinho"></div>
  <p id="total-carrinho" style="font-size: 18px; margin: 15px 0;"></p>
  
  <input id="cliente" placeholder="O teu nome">
  <input id="telefone" placeholder="Telemóvel">
  <input id="morada" placeholder="Morada completa para envio">
  
  <label style="display:block; margin-top:15px;"><strong>📦 Método de envio:</strong></label>
  <select id="envio" onchange="atualizar()">
    <option>Levantamento (Grátis)</option>
    <option>CTT Normal</option>
    <option>CTT Registado</option>
  </select>
  
  <button onclick="finalizar()" class="btn-w">Pedir via WhatsApp</button>
  <button onclick="limparCarrinho()" class="btn-w" style="background:#dc2626;">❌ Limpar Carrinho</button>
</div>

<div class="modal" id="modal" onclick="fecharModal()">
  <img id="imgGrande">
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxGsDtiXsYF5J5jVUHX4X64f5CoqEbY-2w1UU4NcuS2MTYZBnlVWaAb5KEbJt7aIijF/exec'; 

let db = [];
let cart = JSON.parse(localStorage.getItem("cart_artes")) || [];
let favs = JSON.parse(localStorage.getItem("favs_artes")) || [];
let categoriaAtual = localStorage.getItem("ultimaCat_artes") || ""; 
let paginaAtual = 1;
const itensPorPagina = 10;

// Função para limpar e converter preços do Excel (importante!)
function formatarPreco(valor) {
    if (!valor) return 0;
    let limpo = String(valor).replace('€', '').replace(',', '.').trim();
    return parseFloat(limpo) || 0;
}

function carregarProdutos(data){
  db = data.map(p=>({
    ...p,
    id: parseInt(p.id),
    preco: formatarPreco(p.preco),
    precoPromo: formatarPreco(p.precoPromo),
    promo: String(p.promo).toLowerCase().trim() === "sim",
    categoria: p.categoria || "Outros"
  }));

  let categoriasUnicas = [...new Set(db.map(p=>p.categoria))];
  let temPromo = db.some(p => p.promo);
  
  let categorias = [];
  if (temPromo) categorias.push("🔥 Promoções");
  categorias = categorias.concat(categoriasUnicas);

  if(!categoriaAtual || !categorias.includes(categoriaAtual)) {
      categoriaAtual = categorias[0] || "";
  }
  
  document.getElementById('tabs').innerHTML = categorias.map((c)=>`
    <div class="tab ${c === categoriaAtual ? 'active' : ''}" onclick="mudar('${c}',this)">${c}</div>
  `).join("");
  
  renderProdutos();
  atualizar();
}

fetch(API).then(r=>r.json()).then(data=> carregarProdutos(data)).catch(e => console.log(e));

function mudar(c, el){ 
  categoriaAtual = c; 
  paginaAtual = 1; 
  localStorage.setItem("ultimaCat_artes", c); 
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); 
  el.classList.add('active'); 
  renderProdutos(); 
}

function irParaPagina(num){ paginaAtual=num; renderProdutos(); window.scrollTo({top:0,behavior:'smooth'}); }

function renderProdutos(){
  let termo = document.getElementById('pesquisa').value.toLowerCase();
  let lista = db.filter(p => {
    const nomeMatch = p.nome.toLowerCase().includes(termo);
    if (categoriaAtual === "🔥 Promoções") return p.promo && nomeMatch;
    return p.categoria === categoriaAtual && nomeMatch;
  });

  let inicio = (paginaAtual - 1) * itensPorPagina;
  let itens = lista.slice(inicio, inicio + itensPorPagina);
  let h="";
  
  itens.forEach(p=>{
    let fav = favs.includes(p.nome) ? "❤️" : "🤍";
    
    // CONSTRUÇÃO DO PREÇO COM RISCO
    let htmlPreco = "";
    if (p.promo && p.precoPromo > 0) {
        htmlPreco = `
            <div class="container-preco">
                <p class="preco-rasurado">${p.preco.toFixed(2)}€</p>
                <p class="preco-promo">${p.precoPromo.toFixed(2)}€ 🔥</p>
            </div>`;
    } else {
        htmlPreco = `
            <div class="container-preco">
                <p class="preco-unico">${p.preco.toFixed(2)}€</p>
            </div>`;
    }

    h+=`<div class="card">
      <div class="card-wrap">
        ${p.promo ? '<div class="badge">PROMOÇÃO</div>' : ''}
        <span class="fav" onclick="toggleFav('${p.nome}')">${fav}</span>
        <img src="${p.img}" class="img-p" onclick="abrirImg('${p.img}')">
      </div>
      <div class="info">
        <h3 style="margin:0; font-size:16px;">#${p.id} - ${p.nome}</h3>
        ${htmlPreco}
        <button class="btn-add" onclick="add(${p.id})">Adicionar ao Carrinho</button>
      </div>
    </div>`;
  });
  document.getElementById('loja').innerHTML = h || "<p style='text-align:center; padding:20px;'>Nada encontrado.</p>";
  renderPaginacao(Math.ceil(lista.length / itensPorPagina));
}

function renderPaginacao(total){ 
  let h=""; 
  if(total <= 1) { document.getElementById('paginacao').innerHTML = ""; return; }
  for(let i=1;i<=total;i++){ h+=`<button class="btn-pag ${i===paginaAtual?'active':''}" onclick="irParaPagina(${i})">${i}</button>`; } 
  document.getElementById('paginacao').innerHTML = h; 
}

function toggleFav(nome){ 
  if(favs.includes(nome)) favs = favs.filter(f=>f!==nome); 
  else favs.push(nome); 
  localStorage.setItem("favs_artes", JSON.stringify(favs)); 
  renderProdutos(); 
}

function add(id){ 
  let p = db.find(x=>x.id===id); 
  let precoFinal = (p.promo && p.precoPromo > 0) ? p.precoPromo : p.preco; 
  let ex = cart.find(x=>x.id===id); 
  if(ex) ex.qtd++; else cart.push({...p, preco:precoFinal, qtd:1}); 
  atualizar(); 
}

function mais(i){ cart[i].qtd++; atualizar(); }
function menos(i){ cart[i].qtd--; if(cart[i].qtd<=0) cart.splice(i,1); atualizar(); }
function limparCarrinho(){ if(confirm("Anular carrinho?")){ cart=[]; localStorage.clear(); location.reload(); } }

function atualizar(){
  let total=0; let h="";
  cart.forEach((p,i)=>{ 
    total += (p.qtd * p.preco); 
    h+=`<div class="item-cart"><span>#${p.id} ${p.nome} (x${p.qtd})</span>
    <div><button onclick="menos(${i})">-</button><button onclick="mais(${i})" style="margin-left:5px;">+</button></div></div>`; 
  });
  document.getElementById('itens-carrinho').innerHTML = h || "<p>Vazio</p>";
  document.getElementById('total-carrinho').innerHTML = `<strong>Total: ${total.toFixed(2)}€</strong>`;
  localStorage.setItem("cart_artes", JSON.stringify(cart));
}

function finalizar(){
  let n = document.getElementById('cliente').value;
  if(!n) return alert("Indica o teu nome");
  let msg = `*Pedido Cantinho das Artes*\n*Nome:* ${n}\n\n*Itens:*\n`;
  cart.forEach(p=>{ msg += `• #${p.id} ${p.nome} (x${p.qtd}) - ${(p.qtd*p.preco).toFixed(2)}€\n`; });
  window.open(`https://wa.me/351932299225?text=${encodeURIComponent(msg)}`);
}

function abrirImg(src){ 
    document.getElementById('modal').style.display="flex"; 
    document.getElementById('imgGrande').src=src; 
}
function fecharModal(){ document.getElementById('modal').style.display="none"; }

window.addEventListener("load", () => {
  setTimeout(() => { document.getElementById("splash").style.display = "none"; }, 2000);
});
</script>
</body>
</html>
