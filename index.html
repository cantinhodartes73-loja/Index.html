<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantinho das Artes</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">
    <link rel="apple-touch-icon" href="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESeEppzD4RD_b9k3pEsp6FYdkAAd7-9PAAAm4eAAKLSGFWbefvIyuchDw6BA.jpg">
    
    <meta name="theme-color" content="#10b981">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root { --verde: #10b981; --fundo: #f0fdf4; }
        body { font-family: sans-serif; max-width: 450px; margin: auto; padding: 15px; background: var(--fundo); color: #374151; }
        
        /* BANNER PWA */
        #pwa-install-banner {
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: white; padding: 18px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: none; z-index: 10001;
            border: 2px solid var(--verde);
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideUp { from { transform: translateY(120%); } to { transform: translateY(0); } }
        .pwa-content { display: flex; align-items: center; gap: 15px; }
        .pwa-icon { width: 55px; height: 55px; border-radius: 12px; }
        .pwa-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn-pwa-install { background: var(--verde); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; flex: 2; cursor: pointer; }
        .btn-pwa-close { background: #f3f4f6; color: #4b5563; border: none; padding: 10px; border-radius: 10px; flex: 1; cursor: pointer; }

        /* SPLASH SCREEN */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0fdf4; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.8s; }
        #splash img { width: 200px; height: 200px; border-radius: 50%; border: 5px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        #splash h2 { font-size: 32px; color: var(--verde); font-family: 'Great Vibes', cursive; margin-top: 20px; }

        /* LOJA */
        h1 { text-align: center; margin-bottom: 20px; }
        h1 .logo { width: 150px; height: 150px; object-fit: cover; border-radius: 50%; display: block; margin: 0 auto; border: 3px solid var(--verde); }
        h1 .titulo { margin-top: 12px; color: var(--verde); font-size: 38px; font-family: 'Great Vibes', cursive; }
        
        .search { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .tabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 8px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 18px; background: #e5e7eb; border-radius: 12px; cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--verde); color: white; font-weight: bold; }

        /* CARDS */
        .card { background: white; border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        .badge { position: absolute; left: 10px; top: 10px; background: #ef4444; color: white; padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; z-index: 5; }
        .img-p { width: 100%; height: 280px; object-fit: cover; cursor: pointer; display: block; }
        .info { padding: 15px; text-align: center; }
        .btn-add { background: var(--verde); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* CARRINHO */
        .carrinho { background: white; padding: 20px; border-radius: 20px; margin-top: 30px; border: 2px solid var(--verde); }
        .item-cart { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .cart-controls { display: flex; align-items: center; gap: 10px; }
        .cart-controls button { background: #e5e7eb; border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .btn-w { background: #25D366; color: white; padding: 15px; border: none; width: 100%; border-radius: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal img { max-width: 95%; max-height: 90%; border-radius: 10px; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="pwa-install-banner">

        <div class="pwa-text">
            <h4>Instalar Aplicação</h4>
            <p>Acede à loja no teu ecrã inicial!</p>

    </div>
    <div class="pwa-buttons">

</div>

<div id="splash">

    <button onclick="limparCarrinho()" class="btn-w" style="background:#dc2626;">Limpar Carrinho</button>
</div>

<div class="modal" id="modal" onclick="fecharModal()">
    <img id="imgGrande">
</div>
